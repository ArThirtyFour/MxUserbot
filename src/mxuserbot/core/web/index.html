<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title data-i18n="page_title">MXUserbot | Session Init</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card { display: none; }
        .card-active { display: block; animation: fadeIn 0.25s ease-out forwards; }
        .card-exit { display: block; animation: fadeOut 0.2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-15px); } }
        .lang-btn { background: transparent; border: 1px solid #2d2d35; color: #94949e; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .lang-btn:hover { border-color: #444; color: #ececed; }
        .lang-btn.active { background: #ffb2ef; border-color: #ffb2ef; color: #000; }
    </style>
</head>
<body class="bg-[#0b0b0f] text-[#ececed] min-h-screen flex items-center justify-center p-5 overflow-hidden">

    <!-- Language Switcher -->
    <div class="fixed top-5 right-5 flex gap-2 z-50">
        <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
        <button class="lang-btn" onclick="setLang('ru')" id="btn-ru">RU</button>
    </div>

    <div class="w-full max-w-[580px] z-10">
        
        <div id="scr-welcome" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl card-active">
            <h1 class="text-2xl font-semibold mb-3 tracking-tight text-white" data-i18n="app_title">MXUserbot</h1>
            <p class="text-[#94949e] text-sm mb-6" data-i18n="welcome_subtitle"></p>
            
            <div class="border-l-2 border-[#ffb2ef] pl-5 pr-3 py-3 mb-6 bg-[#ffb2ef]/[0.04] text-left">
                <p class="text-sm leading-relaxed text-[#94949e]" data-i18n="welcome_desc"></p>
            </div>

            <ul class="space-y-2.5 mb-8">
                <li class="text-[#94949e] text-sm flex items-start text-left before:text-[#ffb2ef] before:mr-2.5 before:font-bold" data-i18n="feature_1"></li>
                <li class="text-[#94949e] text-sm flex items-start text-left before:text-[#ffb2ef] before:mr-2.5 before:font-bold" data-i18n="feature_2"></li>
                <li class="text-[#94949e] text-sm flex items-start text-left before:text-[#ffb2ef] before:mr-2.5 before:font-bold" data-i18n="feature_3"></li>
            </ul>

            <button onclick="nav('scr-welcome', 'scr-warning')" class="w-full p-3.5 bg-[#ffb2ef] text-black rounded-lg text-sm font-semibold hover:opacity-90 active:scale-[0.98] transition-all" data-i18n="btn_get_started"></button>
        </div>

        <div id="scr-warning" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl">
            <h1 class="text-2xl font-semibold mb-3 tracking-tight text-[#f87171]" data-i18n="warning_title"></h1>
            <p class="text-[#94949e] text-sm mb-6" data-i18n="warning_subtitle"></p>
            
            <div class="border-l-2 border-[#f87171] pl-5 pr-3 py-5 mb-6 bg-[#f87171]/[0.02] text-left">
                <p class="text-sm leading-relaxed text-[#94949e]" data-i18n="warning_text"></p>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="nav('scr-warning', 'scr-login')" class="w-full p-3.5 bg-[#ffb2ef] text-black rounded-lg text-sm font-semibold hover:opacity-90 active:scale-[0.98] transition-all" data-i18n="btn_accept"></button>
                <button onclick="terminate()" class="w-full p-3.5 bg-transparent text-[#94949e] border border-[#2d2d35] rounded-lg text-sm font-semibold hover:text-white hover:border-[#444] transition-all" data-i18n="btn_decline"></button>
            </div>
        </div>

        <form id="scr-login" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl">
            <h1 class="text-2xl font-semibold mb-3 tracking-tight text-white" data-i18n="auth_title"></h1>
            <p class="text-[#94949e] text-sm mb-6" data-i18n="auth_subtitle"></p>
            
            <div class="space-y-5 mb-6 text-left">
                <div>
                    <label class="block text-[11px] font-semibold text-[#94949e] mb-2 uppercase tracking-wider" data-i18n="label_mxid"></label>
                    <input id="mxid" type="text" placeholder="@user:matrix.org" required class="w-full p-3.5 bg-black border border-[#2d2d35] rounded-lg text-white text-sm outline-none focus:border-[#ffb2ef] transition-all">
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-[#94949e] mb-2 uppercase tracking-wider" data-i18n="label_password"></label>
                    <input id="pass" type="password" placeholder="••••••••" required class="w-full p-3.5 bg-black border border-[#2d2d35] rounded-lg text-white text-sm outline-none focus:border-[#ffb2ef] transition-all">
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button type="submit" class="w-full p-3.5 bg-[#ffb2ef] text-black rounded-lg text-sm font-semibold hover:opacity-90 active:scale-[0.98] transition-all" data-i18n="btn_signin"></button>
                <button type="button" onclick="nav('scr-login', 'scr-welcome')" class="w-full p-3.5 bg-transparent text-[#94949e] border border-[#2d2d35] rounded-lg text-sm font-semibold hover:text-white hover:border-[#444] transition-all text-center" data-i18n="btn_cancel"></button>
            </div>
        </form>

        <div id="scr-loading" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl">
            <div class="w-8 h-8 border-2 border-white/5 border-t-[#ffb2ef] rounded-full animate-spin mx-auto mb-5"></div>
            <h1 class="text-2xl font-semibold mb-3 text-white" data-i18n="loading_title"></h1>
            <p class="text-[#94949e] text-sm" data-i18n="loading_text"></p>
        </div>

        <div id="scr-result" class="card bg-[#16161a] border border-[#2d2d35] rounded-xl p-10 text-center shadow-2xl">
            <h1 id="res-title" class="text-2xl font-semibold mb-3 text-white" data-i18n="result_title"></h1>
            <p id="res-desc" class="text-[#94949e] text-sm mb-6"></p>
            <div id="res-actions"></div>
        </div>
    </div>

    <script>
        let translations = {};
        let currentLang = 'en';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/locale');
                translations = await response.json();
                setLang(currentLang);
            } catch (error) {
                console.error('Error fetching translations:', error);
            }
        });

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = (translations[lang] && translations[lang][key]) || (translations['en'] && translations['en'][key]);
                if (translation) {
                    if (el.tagName === 'TITLE') {
                        document.title = translation;
                    } else {
                        el.innerHTML = translation;
                    }
                }
            });
        }

        const nav = (from, to) => {
            const elFrom = document.getElementById(from);
            const elTo = document.getElementById(to);
            elFrom.classList.remove('card-active');
            elFrom.classList.add('card-exit');
            setTimeout(() => {
                elFrom.classList.remove('card-exit');
                elTo.classList.add('card-active');
            }, 200);
        };

        const terminate = () => {
            const t = document.getElementById('res-title'), d = document.getElementById('res-desc'), a = document.getElementById('res-actions');
            t.innerHTML = translations[currentLang].access_denied;
            t.classList.add('text-[#f87171]');
            d.innerHTML = translations[currentLang].session_terminated;
            a.innerHTML = `<div class="mt-8 pt-5 border-t border-[#2d2d35] flex justify-center gap-5 text-xs">` +
                `<a href="https://matrix.to/#/#SpacePashaHatsune:matrix.org" class="text-[#ffb2ef] hover:underline">space</a>` +
                `<a href="https://github.com/MxUserBot/MxUserbot" class="text-[#ffb2ef] hover:underline">github</a>` +
                `<a href="https://destream.net/live/Pashahatsune/donate" class="text-[#ffb2ef] hover:underline">donate</a>` +
                `</div>`;
            document.body.querySelector('.card-active')?.classList.remove('card-active', 'bg-[#16161a]');
            document.body.innerHTML += `
                <div class="w-full max-w-[580px] bg-[#16161a] border border-[#f87171] rounded-xl p-10 text-center shadow-2xl card-active">
                    <h1 class="text-2xl font-semibold mb-3 text-[#f87171]">${t.innerHTML}</h1>
                    <p class="text-[#94949e] text-sm">${d.innerHTML}</p>
                </div>`;
        };

        document.getElementById('scr-login').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('mxid').value.trim();
            const p = document.getElementById('pass').value;
            if(!u.includes(':')) return alert(translations[currentLang].mxid_format_error);
            nav('scr-login', 'scr-loading');
            const start = Date.now();
            let ok = false, msg = "";
            try {
                const r = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mxid: u, password: p})
                });
                const d = await r.json();
                ok = r.ok; msg = d.detail || "";
            } catch { msg = translations[currentLang].server_unreachable; }
            setTimeout(() => {
                const t = document.getElementById('res-title'), d = document.getElementById('res-desc'), a = document.getElementById('res-actions');
                if(ok) {
                    t.innerHTML = translations[currentLang].result_success;
                    t.classList.add('text-white');
                    d.innerHTML = "";
                    a.innerHTML = `<button onclick="window.open('https://docs.example.com')" class="w-full p-3.5 bg-[#ffb2ef] text-black rounded-lg text-sm font-semibold hover:opacity-90 active:scale-[0.98] transition-all">${translations[currentLang].btn_docs}</button>` +
                        `<div class="mt-8 pt-5 border-t border-[#2d2d35] flex justify-center gap-5 text-xs">` +
                        `<a href="https://matrix.to/#/#SpacePashaHatsune:matrix.org" class="text-[#ffb2ef] hover:underline">space</a>` +
                        `<a href="https://github.com/MxUserBot/MxUserbot" class="text-[#ffb2ef] hover:underline">github</a>` +
                        `<a href="https://destream.net/live/Pashahatsune/donate" class="text-[#ffb2ef] hover:underline">donate</a>` +
                        `</div>`;
                } else {
                    t.innerHTML = translations[currentLang].result_failed; 
                    t.classList.add('text-[#f87171]');
                    d.innerHTML = msg || translations[currentLang].result_failed;
                    a.innerHTML = `<button onclick="nav('scr-result', 'scr-login')" class="w-full p-3.5 bg-[#ffb2ef] text-black rounded-lg text-sm font-semibold hover:opacity-90 active:scale-[0.98] transition-all">${translations[currentLang].btn_try_again}</button>`;
                }
                nav('scr-loading', 'scr-result');
            }, Math.max(0, 1500 - (Date.now() - start)));
        };
    </script>
</body>
</html>
